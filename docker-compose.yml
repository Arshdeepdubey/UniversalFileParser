services:
  ufp-parser:
    build: .
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
    # Use ; so tail runs regardless of test success/failure
    command: >
      sh -c "python scripts/generate_test_data.py; 
             pytest tests/test_phase4_integration.py -v; 
             tail -f /dev/null"