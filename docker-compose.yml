version: '3.8'

services:
  parser:
    build:
      context: .
      target: runtime
    ports:
      - "8000:8000"
    environment:
      - ENV=production

  parser-dev:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
    ports:
      - "8001:8001"
    environment:
      - ENV=development