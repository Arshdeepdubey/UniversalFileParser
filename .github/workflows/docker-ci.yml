name: UFP Docker CI

on:
  push:
    branches: [ feat/foundation-bootstrap, master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker-compose build

      - name: Run Integration Tests
        run: |
          docker-compose run ufp-parser sh -c "python scripts/generate_test_data.py && pytest tests/ -v --cov=extension"